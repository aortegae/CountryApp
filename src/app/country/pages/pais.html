<country-search placeholder="Search by country name..." (term)="term.set($event)" />
@if (paisRxResource.isLoading()) {
<span class="loading loading-dots loading-lg">Loading</span>
  <p>Loading...</p>
}
@if (paisRxResource.error(); as err) {
  <p class="error">{{err.message}}</p>
} @else if (paisRxResource.hasValue()) {
  <country-list [countries]="paisRxResource.value()!" />
}
