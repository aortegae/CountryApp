<section class="flex flex-row gap-2 mt-2">
  <input
    type="text"
    class="input input-bordered w-full max-w-xs"
    [placeholder]="placeholder()"
    autoFocus
    #txtTerm
    (keyup.enter)="term.emit(txtTerm.value)"
  />
  <button class="btn btn-primary" (click)="term.emit(txtTerm.value)">Search</button>
</section>
